<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso y Registro - Zapas</title>
    <link rel="stylesheet" href="estilouser.css">
</head>

<body>

    <div class="container" id="login-container">
        <h2>Iniciar Sesión</h2>

        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>

        <button id="btn-login">Ingresar</button>
        <button id="abrir-register" class="btn-secondary">¿No tienes cuenta? Regístrate</button>

        <p id="mensaje" class="mensaje"></p>
    </div>

    <!-- MODAL REGISTER -->
    <div id="modal-register" class="modal">
        <div class="modal-content">
            <span id="cerrar-register" class="close">&times;</span>

            <h2>Crear Cuenta</h2>
            <p>Completa tus datos para registrarte.</p>

            <div class="form-grid">
                <input type="text" id="reg-nombre" placeholder="Nombre completo" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                <input type="text" id="reg-telefono" placeholder="Teléfono">
                <input type="text" id="reg-direccion" placeholder="Dirección">
                <input type="text" id="reg-ciudad" placeholder="Ciudad">
                <input type="password" id="reg-password" placeholder="Contraseña" required>
            </div>

            <button id="btn-registrar-modal">Registrarse</button>

            <p id="mensaje-register" class="mensaje"></p>
        </div>
    </div>

    <!-- scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="MAIN/js/supabase.js"></script>
    <script src="MAIN/js/usuario.js"></script>

</body>

</html>
