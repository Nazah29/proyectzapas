<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = 'TU_URL'
const supabaseKey = 'TU_ANON_KEY'
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)

// ===============================
// CARGAR DETALLE DESDE SUPABASE
// ===============================
async function cargarDetalle() {
  const params = new URLSearchParams(window.location.search);
  const idProducto = params.get("id");

  if (!idProducto) {
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:40px;'>Producto no encontrado</h1>";
    return;
  }

  const { data, error } = await supabaseClient
    .from('productos')
    .select('*')
    .eq('id', idProducto)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:40px;'>Producto no disponible</h1>";
    return;
  }

  // Rellenar datos
  document.getElementById("producto-nombre").textContent = data.nombre;
  document.getElementById("producto-imagen").src = data.imagen;
  document.getElementById("producto-descripcion").innerHTML = data.descripcion;
  document.getElementById("producto-color").textContent = data.color;
  document.getElementById("producto-tallas").textContent = data.tallas;
  document.getElementById("producto-precio").textContent = data.precio;
}

cargarDetalle()
</script>
