<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Carrito - Zapas</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 800px;
      margin: 50px auto;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #333;
    }
    .cart-item:last-child {
      border-bottom: none;
    }
    .cart-item h4 {
      margin: 0;
      font-size: 1.1rem;
    }
    .cart-item .precio {
      color: #ff4757;
      font-weight: bold;
    }
    .btn-eliminar {
      background: #ff4757;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-eliminar:hover {
      background: #ff6b81;
    }
    .total-section {
      text-align: right;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #333;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .btn-comprar {
      display: block;
      width: 100%;
      background: #2ed573;
      color: white;
      border: none;
      padding: 15px;
      margin-top: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-comprar:hover {
      background: #7bed9f;
    }
    .nav-volver {
      display: inline-block;
      margin-bottom: 20px;
      color: #ccc;
      text-decoration: none;
      font-size: 1.1rem;
    }
    .nav-volver:hover {
      color: #fff;
    }
    .empty-cart {
      text-align: center;
      padding: 40px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    <a href="index.html" class="nav-volver"><i class="bi bi-arrow-left"></i> Volver a la tienda</a>
    
    <h2><i class="bi bi-cart3"></i> Mi Carrito</h2>

    <div id="lista-carrito">
      <!-- Los items se cargarán aquí por JS -->
    </div>

    <div class="total-section">
      Total: S/ <span id="total-precio">0.00</span>
    </div>

    <button class="btn-comprar" id="btn-finalizar-compra">Proceder al Pago <i class="bi bi-credit-card"></i></button>
  </div>

  <script src="js/carrito-page.js"></script>
</body>

</html>
